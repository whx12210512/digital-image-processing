<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="扫码识别">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    <meta name="theme-color" content="#1a73e8">
    <link rel="manifest" href="manifest.json">
    <title>条码/二维码扫描器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash" class="splash-screen">
        <div class="splash-content">
            <div class="splash-icon">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <rect x="10" y="10" width="60" height="60" rx="12" fill="none" stroke="#fff" stroke-width="4"/>
                    <rect x="20" y="20" width="40" height="40" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
                    <line x1="30" y1="33" x2="50" y2="33" stroke="#fff" stroke-width="2"/>
                    <line x1="30" y1="40" x2="50" y2="40" stroke="#fff" stroke-width="2"/>
                    <line x1="30" y1="47" x2="50" y2="47" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>
            <h1>条码/二维码扫描器</h1>
            <p>数字图像处理课程项目</p>
            <span class="splash-version">v2.0.5</span>
            <div class="splash-loader"></div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app-container" style="display:none;">
        <!-- Header -->
        <header class="app-header">
            <div class="header-title">
                <svg width="28" height="28" viewBox="0 0 80 80">
                    <rect x="10" y="10" width="60" height="60" rx="12" fill="none" stroke="#fff" stroke-width="4"/>
                    <rect x="22" y="22" width="36" height="36" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
                    <line x1="31" y1="34" x2="49" y2="34" stroke="#fff" stroke-width="1.8"/>
                    <line x1="31" y1="40" x2="49" y2="40" stroke="#fff" stroke-width="1.8"/>
                    <line x1="31" y1="46" x2="49" y2="46" stroke="#fff" stroke-width="1.8"/>
                </svg>
                <span>扫码识别</span>
                <span class="header-version">v2.0.5</span>
            </div>
            <button id="btnSettings" class="icon-btn" title="设置">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </header>

        <!-- Tab Navigation -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="scan">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 7V5a2 2 0 012-2h2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M21 17v2a2 2 0 01-2 2h-2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/>
                </svg>
                <span>扫描</span>
            </button>
            <button class="tab-btn" data-tab="gallery">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                </svg>
                <span>图片</span>
            </button>
            <button class="tab-btn" data-tab="history">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>历史</span>
            </button>
        </nav>

        <!-- Scan Tab -->
        <main id="tab-scan" class="tab-content active">
            <div class="scan-container">
                <!-- Camera View -->
                <div id="reader" class="reader-box"></div>

                <!-- Scan Overlay -->
                <div id="scanOverlay" class="scan-overlay" style="display:none;">
                    <div class="scan-frame">
                        <div class="corner tl"></div><div class="corner tr"></div>
                        <div class="corner bl"></div><div class="corner br"></div>
                    </div>
                    <p class="scan-hint">将条码/二维码对准框内</p>
                </div>

                <!-- Placeholder when camera not active -->
                <div id="scanPlaceholder" class="scan-placeholder">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5">
                        <path d="M3 7V5a2 2 0 012-2h2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M21 17v2a2 2 0 01-2 2h-2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/>
                    </svg>
                    <p>点击下方按钮开始扫描</p>
                </div>
            </div>

            <!-- Controls -->
            <div class="scan-controls">
                <button id="btnStartScan" class="btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
                    </svg>
                    开始扫描
                </button>
                <button id="btnStopScan" class="btn-secondary" style="display:none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="6" width="12" height="12" rx="1"/>
                    </svg>
                    停止扫描
                </button>
                <button id="btnUpload" class="btn-outline">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    选择图片
                </button>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
            </div>

            <!-- Result Card -->
            <div id="resultCard" class="result-card" style="display:none;">
                <div class="result-header">
                    <span id="resultType" class="badge">QR Code</span>
                    <span id="resultConfidence" class="confidence"></span>
                    <button id="btnCloseResult" class="icon-btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div id="resultContent" class="result-content"></div>
                <div class="result-actions">
                    <button id="btnCopy" class="btn-sm">复制</button>
                    <button id="btnOpenUrl" class="btn-sm" style="display:none;">打开链接</button>
                </div>
            </div>
        </main>

        <!-- Gallery Tab -->
        <main id="tab-gallery" class="tab-content">
            <div class="gallery-header">
                <h3>测试图片库</h3>
                <p class="gallery-desc">选择图片进行扫码识别测试</p>
            </div>
            <div id="galleryGrid" class="gallery-grid"></div>
            <div id="galleryUploadArea" class="gallery-upload-area">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p>上传本地图片进行识别</p>
                <button id="btnGalleryUpload" class="btn-outline">选择图片</button>
                <input type="file" id="galleryFileInput" accept="image/*" style="display:none;">
            </div>
            <!-- Gallery result -->
            <div id="galleryResultCard" class="result-card" style="display:none;"></div>
        </main>

        <!-- History Tab -->
        <main id="tab-history" class="tab-content">
            <div class="history-header">
                <h3>扫描历史</h3>
                <button id="btnClearHistory" class="btn-text">清空</button>
            </div>
            <div id="historyList" class="history-list">
                <p class="empty-hint">暂无扫描记录</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal" style="display:none;">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>设置</h3>
                    <button id="btnCloseSettings" class="icon-btn-sm">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label>扫描类型</label>
                        <select id="scanFormat">
                            <option value="all">全部 (QR + 条码)</option>
                            <option value="qr">仅 QR 码</option>
                            <option value="barcode">仅条形码</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>摄像头</label>
                        <select id="cameraSelect">
                            <option value="environment">后置摄像头</option>
                            <option value="user">前置摄像头</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>声音提示</label>
                        <input type="checkbox" id="soundToggle" checked>
                    </div>
                    <div class="setting-item">
                        <label>扫描到链接自动跳转</label>
                        <input type="checkbox" id="autoRedirectToggle" checked>
                    </div>
                    <div class="setting-item">
                        <label>关于</label>
                        <p class="about-text">
                            数字图像处理课程大作业<br>
                            任务四：条形码/二维码识别<br>
                            南方科技大学 电子与电气工程系<br>
                            2026
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast" style="display:none;"></div>
    </div>

    <script>
      // Always hide splash after timeout, even if CDN scripts fail
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          var app = document.getElementById('app');
          if (splash) splash.classList.add('hide');
          if (app) app.style.display = 'flex';
        }, 1500);
      });
    </script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"
            onerror="console.warn('html5-qrcode CDN failed')"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
            onerror="console.warn('jsQR CDN failed')"></script>
    <script src="app.js"></script>
</body>
</html>
